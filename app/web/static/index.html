<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KRAKEN CASE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-left">
                <span class="logo">🦑 KRAKEN CASE</span>
            </div>
            <div class="header-right">
                <span id="balance" class="balance">0⭐</span>
            </div>
        </header>

        <!-- Screens -->
        <main id="main">
            <!-- Home -->
            <section id="screen-home" class="screen active">
                <div class="welcome">
                    <div class="welcome-icon">🎮</div>
                    <h2>Добро пожаловать!</h2>
                    <p>Открывай кейсы, выигрывай звёзды и поднимайся в рейтинге!</p>
                </div>
                <button class="btn btn-primary btn-big" onclick="KrakenApp.openCase()">
                    🎁 Открыть кейс
                </button>
                <div class="info-cards">
                    <div class="info-card">
                        <span class="info-label">📦 Открыто кейсов</span>
                        <span id="stat-cases" class="info-value">0</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">🏅 Ранг</span>
                        <span id="stat-rank" class="info-value">Bronze</span>
                    </div>
                </div>
            </section>

            <!-- Case result -->
            <section id="screen-result" class="screen">
                <div class="case-result">
                    <div id="result-icon" class="result-icon">🎁</div>
                    <h2 id="result-title">Кейс открыт!</h2>
                    <div id="result-reward" class="result-reward">+0 ⭐</div>
                    <div id="result-profit" class="result-profit"></div>
                    <button class="btn btn-primary" onclick="KrakenApp.showHome()">🏠 Главная</button>
                    <button class="btn btn-secondary" onclick="KrakenApp.openCase()">📦 Ещё кейс</button>
                </div>
            </section>

            <!-- Leaderboard -->
            <section id="screen-leaderboard" class="screen">
                <h2>🏆 Топ игроков</h2>
                <div id="leaderboard-list" class="leaderboard"></div>
                <button class="btn btn-secondary" onclick="KrakenApp.showHome()">◀️ Назад</button>
            </section>

            <!-- Error -->
            <section id="screen-error" class="screen">
                <div class="error-box">
                    <div class="error-icon">⚠️</div>
                    <p id="error-text">Произошла ошибка</p>
                    <button class="btn btn-secondary" onclick="KrakenApp.showHome()">🏠 Главная</button>
                </div>
            </section>
        </main>

        <!-- Bottom nav -->
        <nav id="nav">
            <button class="nav-btn active" data-screen="home" onclick="KrakenApp.showHome()">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </button>
            <button class="nav-btn" data-screen="leaderboard" onclick="KrakenApp.showLeaderboard()">
                <span class="nav-icon">🏆</span>
                <span class="nav-label">Рейтинг</span>
            </button>
        </nav>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
